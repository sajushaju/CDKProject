name: AWS CDK Deploy

on:
  push:
    branches: [ main ] # This triggers the robot every time you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest moto pytest-mock # Tools for testing

      - name: Run Unit Tests
        run: |
          python -m pytest -v # If tests fail, it stops here!
          
      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: CDK Deploy
        run: cdk deploy --all --require-approval never
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1" # Change this if your region is different